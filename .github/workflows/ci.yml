name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Commit dist if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ "$(git diff --name-only dist/)" != "" ]; then
            echo "dist/ is out of date, committing changes..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist/
            git commit -m "build: update dist [skip ci]"
            git push
          else
            echo "dist/ is up to date"
          fi

      - name: Check dist is up to date
        if: github.event_name == 'pull_request'
        run: |
          if [ "$(git diff --name-only dist/)" != "" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff --stat dist/
            exit 1
          fi
          echo "dist/ is up to date"

  test-action:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create test CDK project
        run: |
          mkdir -p test-cdk-project
          cd test-cdk-project
          npm init -y
          npm install aws-cdk-lib constructs

          # Create a minimal CDK app for testing
          cat > cdk.json << 'EOF'
          {
            "app": "npx ts-node --prefer-ts-exts bin/app.ts"
          }
          EOF

          mkdir -p bin lib
          cat > bin/app.ts << 'EOF'
          import * as cdk from 'aws-cdk-lib';
          import { TestStack } from '../lib/stack';

          const app = new cdk.App();
          new TestStack(app, 'TestStack');
          EOF

          cat > lib/stack.ts << 'EOF'
          import * as cdk from 'aws-cdk-lib';
          import * as s3 from 'aws-cdk-lib/aws-s3';
          import { Construct } from 'constructs';

          export class TestStack extends cdk.Stack {
            constructor(scope: Construct, id: string, props?: cdk.StackProps) {
              super(scope, id, props);

              // Intentionally insecure bucket for testing
              new s3.Bucket(this, 'TestBucket');
            }
          }
          EOF

          npm install typescript ts-node @types/node

          # Synthesize
          npx cdk synth --quiet || true

      - name: Test action
        id: cdk-insights
        uses: ./
        with:
          working-directory: test-cdk-project
          stack-name: TestStack
          pr-comment: 'false'
          sarif-upload: 'false'

      - name: Verify outputs
        env:
          TOTAL: ${{ steps.cdk-insights.outputs.total-issues }}
          JSON_FILE: ${{ steps.cdk-insights.outputs.json-file }}
          EXIT_CODE: ${{ steps.cdk-insights.outputs.exit-code }}
        run: |
          echo "Total issues: $TOTAL"
          echo "JSON file: $JSON_FILE"
          echo "Exit code: $EXIT_CODE"

          if [ -z "$TOTAL" ]; then
            echo "::error::total-issues output is empty"
            exit 1
          fi

          if [ -z "$JSON_FILE" ]; then
            echo "::error::json-file output is empty"
            exit 1
          fi

          if [ -z "$EXIT_CODE" ]; then
            echo "::error::exit-code output is empty"
            exit 1
          fi

          echo "All outputs verified"
