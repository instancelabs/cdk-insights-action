name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist
        run: |
          if [ ! -f dist/index.js ]; then
            echo "dist/index.js not found"
            exit 1
          fi
          echo "Build output verified"

  test-action:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create test CDK project
        run: |
          mkdir -p test-cdk-project
          cd test-cdk-project
          npm init -y
          npm install aws-cdk-lib constructs

          # Create a minimal CDK app for testing
          cat > cdk.json << 'EOF'
          {
            "app": "npx ts-node --prefer-ts-exts bin/app.ts"
          }
          EOF

          mkdir -p bin lib
          cat > bin/app.ts << 'EOF'
          import * as cdk from 'aws-cdk-lib';
          import { TestStack } from '../lib/stack';

          const app = new cdk.App();
          new TestStack(app, 'TestStack');
          EOF

          cat > lib/stack.ts << 'EOF'
          import * as cdk from 'aws-cdk-lib';
          import * as s3 from 'aws-cdk-lib/aws-s3';
          import { Construct } from 'constructs';

          export class TestStack extends cdk.Stack {
            constructor(scope: Construct, id: string, props?: cdk.StackProps) {
              super(scope, id, props);

              // Intentionally insecure bucket for testing
              new s3.Bucket(this, 'TestBucket');
            }
          }
          EOF

          npm install typescript ts-node @types/node

          # Synthesize
          npx cdk synth --quiet || true

      - name: Test action (dry run)
        uses: ./
        with:
          working-directory: test-cdk-project
          pr-comment: 'false'
          sarif-upload: 'false'
        continue-on-error: true  # Allow to fail since we're testing

      - name: Verify outputs
        run: |
          echo "Action completed"
